apiVersion: v1
kind: Pod 
metadata:
  name: giropops-pod
spec:
  containers:
  - name: giropops-containers
    image: nginx
    env:
    - name: USERNAME
      valueFrom: 
        secretKeyRef:
          name: giropops-secret
          key: username
    - name: PASSWORD
      valueFrom:
        secretKeyRef:
          name: giropops-secret
          key: password
    resources:
      limits:
        memory: 125Mi
        cpu: 1