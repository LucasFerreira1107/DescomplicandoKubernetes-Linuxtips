apiVersion: v1
kind: Pod
metadata:
  labels:
    run: girus
    service: proxy
  name: girus
spec:
  containers:
  - image: nginx
    name: girus
    resources:
      limits:
        cpu: "0.5"
        memory: "120Mi"
      requests:
        cpu: "0.3"
        memory: "64Mi"
  dnsPolicy: ClusterFirst
  restartPolicy: Always

