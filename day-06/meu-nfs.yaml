apiVersion: v1
kind: PersistentVolume
metadata:
    name: meu-nfs
    labels:
        storage: nfs
spec:
    capacity:
        storage: 1Gi
    accessModes:
        - ReadWriteOnce
    persistentVolumeReclaimPolicy: Retain
    nfs:
        server: 192.168.56.11
        path: "/mnt/nfs"
    storageClassName: nfs
